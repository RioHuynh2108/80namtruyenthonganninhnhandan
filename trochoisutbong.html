<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game ANND ⚽</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a1f2e;
  color:white;
  text-align:center;
}

/* MENU */
.menu{
  position:fixed;
  width:100%;
  height:100%;
  background:#000c;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
.box{
  background:#111;
  padding:30px;
  border-radius:15px;
}
button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.start{background:#FFD700;}
.exit{background:#444;color:white}

/* SÂN */
.field{
  position:relative;
  height:300px;
  background:linear-gradient(#1e7d32,#4caf50);
}

.goal{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:200px;
  height:100px;
  border:4px solid white;
  border-bottom:none;
}

.goalkeeper{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  transition:0.4s;
}

.dive-left{ transform:translateX(-120px); }
.dive-right{ transform:translateX(60px); }

.ball{
  position:absolute;
  bottom:20px;
  left:50%;
  width:40px;
  height:40px;
  background:white;
  border-radius:50%;
  transform:translateX(-50%);
  transition:0.6s;
}

.effect{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  opacity:0;
}

/* UI */
.answers button{
  display:block;
  width:90%;
  margin:8px auto;
  background:#333;
  color:white;
}
.answers button:hover{
  background:#FFD700;
  color:black;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu" id="menu">
  <div class="box">
    <h2>⚽ GAME ANND</h2>
    <button class="start" onclick="startGame()">▶️ Bắt đầu</button>
  </div>
</div>

<h2>⚽ Sút bóng trả lời câu hỏi</h2>
<div>Điểm: <span id="score">0</span>/5</div>

<div class="field">
  <div class="goal"></div>
  <div class="goalkeeper" id="keeper">🧍‍♂️</div>
  <div class="ball" id="ball"></div>
  <div class="effect" id="effect"></div>
</div>

<div id="question"></div>
<div class="answers" id="answers"></div>
<div id="explainBox"></div>

<script>
const questions = [
  {
    q: "Sự kiện nào được xem là mốc khởi đầu của lực lượng An ninh nhân dân?",
    a: ["21/2/1946", "11/3/1948", "19/8/1945", "1954"],
    correct: 2,
    ex: "Ngày 19/8/1945 là mốc thành lập Việt Nam Công an vụ – tiền thân của lực lượng CAND, có nhiệm vụ bảo vệ chính quyền cách mạng non trẻ."
  },
  {
    q: "Trong kháng chiến chống Pháp, nhiệm vụ chính của lực lượng An ninh là gì?",
    a: ["Tuyên truyền quần chúng", "Chống gián điệp, bảo vệ cơ sở cách mạng", "Chỉ huy chiến đấu", "Hậu cần"],
    correct: 1,
    ex: "Lực lượng An ninh tập trung bảo vệ nội bộ, chống gián điệp, giữ an toàn cho cách mạng."
  },
  {
    q: "Một chiến công tiêu biểu giai đoạn này là gì?",
    a: ["Điện Biên Phủ", "Ngăn chặn âm mưu phá hoại chính quyền", "Đánh đồn", "Ngoại giao"],
    correct: 1,
    ex: "Lực lượng An ninh góp phần bảo vệ sự tồn tại của Nhà nước non trẻ trước âm mưu phá hoại."
  },
  {
    q: "Ý nghĩa của việc “dựa vào dân” là gì?",
    a: ["Thu thập thông tin cá nhân", "Tạo sức mạnh toàn dân", "Huy động chiến tranh", "Tuyên truyền"],
    correct: 1,
    ex: "Nhân dân là nền tảng giúp lực lượng An ninh hoàn thành nhiệm vụ."
  },
  {
    q: "Năm 1954 gắn với sự kiện nào?",
    a: ["Kết thúc chiến tranh", "Chia cắt đất nước", "Bắt đầu chống Mỹ", "Hiệp định Giơ-ne-vơ"],
    correct: 3,
    ex: "Hiệp định Giơ-ne-vơ là mốc quan trọng, làm thay đổi nhiệm vụ của lực lượng An ninh."
  },
  {
    q: "Nhiệm vụ trọng tâm ở miền Bắc là gì?",
    a: ["Chi viện miền Nam", "Bảo vệ an ninh chính trị", "Cải cách ruộng đất", "Xây dựng công nghiệp"],
    correct: 1,
    ex: "Giữ ổn định chính trị để xây dựng chủ nghĩa xã hội."
  },
  {
    q: "Vai trò của lực lượng An ninh ở miền Nam là gì?",
    a: ["Hậu phương", "Tình báo, bảo vệ cơ sở cách mạng", "Chỉ huy quân sự", "Di cư"],
    correct: 1,
    ex: "Lực lượng hoạt động bí mật, góp phần quan trọng vào thắng lợi."
  },
  {
    q: "Âm mưu địch bị đấu tranh mạnh là gì?",
    a: ["Chiến tranh đặc biệt", "Chiến tranh cục bộ", "Diễn biến hòa bình", "Lật đổ, phá hoại nội bộ"],
    correct: 3,
    ex: "Đây là hoạt động nguy hiểm nhất từ bên trong."
  },
  {
    q: "Ý nghĩa năm 1975 với lực lượng An ninh là gì?",
    a: ["Giải tán", "Bước sang giai đoạn mới", "Ngoại giao", "Xây dựng"],
    correct: 1,
    ex: "Sau 1975, lực lượng hoạt động trên phạm vi cả nước."
  },
  {
    q: "Biểu tượng tiêu biểu của giai đoạn này là ai?",
    a: ["Nhà khoa học", "Anh hùng LLVTND", "Vận động viên", "Nhà văn"],
    correct: 1,
    ex: "Họ là những người hy sinh thầm lặng vì an ninh Tổ quốc."
  }
];

let quiz = [];
let current = 0;
let score = 0;

/* RANDOM 5 CÂU */
function getRandom(){
  return [...questions].sort(()=>0.5-Math.random()).slice(0,5);
}

/* START */
function startGame(){
  document.getElementById("menu").style.display="none";
  quiz = getRandom();
  current = 0;
  score = 0;
  document.getElementById("score").innerText=0;
  loadQuestion();
}

/* LOAD */
function loadQuestion(){
  document.getElementById("explainBox").innerHTML="";
  const q = quiz[current];
  document.getElementById("question").innerHTML=`<h3>Câu ${current+1}/5: ${q.q}</h3>`;
  
  let html="";
  q.a.forEach((ans,i)=>{
    html+=`<button onclick="shoot(${i})">${ans}</button>`;
  });
  document.getElementById("answers").innerHTML=html;
}

/* KEEPER */
function moveKeeper(){
  const k=document.getElementById("keeper");
  k.classList.remove("dive-left","dive-right");
  Math.random()<0.5 ? k.classList.add("dive-left") : k.classList.add("dive-right");
}

/* SHOOT */
function shoot(i){
  const q = quiz[current];
  moveKeeper();

  let correct = (i===q.correct);
  const ball=document.getElementById("ball");
  const effect=document.getElementById("effect");

  if(correct){
    ball.style.transform="translate(-50%,-200px)";
    effect.innerText="GOAL ⚽";
    score++;
    document.getElementById("score").innerText=score;
  }else{
    ball.style.transform="translate(-150%,-150px)";
    effect.innerText="MISS ❌";
  }

  effect.style.opacity=1;

  setTimeout(()=>{
    showExplain(correct,q);
    resetField();
  },800);
}

/* GIẢI THÍCH */
function showExplain(correct,q){
  document.getElementById("answers").innerHTML="";
  
  document.getElementById("explainBox").innerHTML=`
    <p style="color:${correct?'lightgreen':'red'}">
      ${correct?'✅ Đúng':'❌ Sai'}
    </p>
    <p><b>Đáp án:</b> ${q.a[q.correct]}</p>
    <p><b>Giải thích:</b> ${q.ex}</p>
    <button onclick="next()">👉 Tôi đã hiểu – Chơi tiếp</button>
  `;
}

/* NEXT */
function next(){
  current++;
  if(current<quiz.length){
    loadQuestion();
  }else{
    endGame();
  }
}

/* RESET */
function resetField(){
  const ball=document.getElementById("ball");
  const keeper=document.getElementById("keeper");
  const effect=document.getElementById("effect");

  ball.style.transform="translateX(-50%)";
  keeper.classList.remove("dive-left","dive-right");
  effect.style.opacity=0;
}

/* END */
function endGame(){
  document.getElementById("question").innerHTML="🎉 Kết thúc!";
  document.getElementById("answers").innerHTML="";
  document.getElementById("explainBox").innerHTML=`
    <h3>Điểm: ${score}/5</h3>
    <button onclick="startGame()">🔄 Chơi lại</button>
  `;
}
</script>

</body>
</html>
