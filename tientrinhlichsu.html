<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline ngang</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0a0a0a;
  color:white;
}

/* TITLE */
.title{
  text-align:center;
  padding:20px;
  font-size:24px;
  color:#FFD700;
}

/* TIMELINE */
.timeline{
  position:relative;
  width:90%;
  margin:80px auto;
  display:flex;
  justify-content:space-between;
  align-items:flex-start; /* 👈 cho item nằm dưới trục */
}

/* TRỤC NGANG */
.timeline::before{
  content:'';
  position:absolute;
  top:0; /* 👈 đưa trục lên trên */
  left:0;
  width:100%;
  height:4px;
  background:linear-gradient(to right, #FFD700, transparent);
}

/* ITEM */
.item{
  position:relative;
  text-align:center;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* DOT */
.dot{
  width:18px;
  height:18px;
  background:#FFD700;
  border-radius:50%;
  box-shadow:0 0 10px #FFD700;
  margin-top:-9px; /* 👈 kéo dot dính vào trục */
}



/* BOX */
.box{
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  border:2px solid rgba(255,215,0,0.3);
  transition:0.3s;
  min-width:100px;
}

.box:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #FFD700;
}

/* PANEL */
.panel{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:75%;
  background:#111;
  border-top:3px solid #FFD700;
  transition:0.5s;
  padding:20px;
  overflow:auto;
}

.panel.active{
  bottom:0;
}

/* CLOSE */
.close{
  position:absolute;
  top:10px;
  right:40px;
  font-size:28px;
  cursor:pointer;
}

/* TAB */
.tabs{
  display:flex;
  gap:10px;
  margin-top:30px;
}

.tabs button{
  padding:8px 15px;
  border:none;
  background:#333;
  color:white;
  cursor:pointer;
}

.tabs button.active{
  background:#FFD700;
  color:#000;
}

/* CONTENT */
.tab-content{
  display:none;
  margin-top:15px;
}

.tab-content.active{
  display:block;
}

/* MOBILE ZIGZAG */
@media(max-width:768px){

  .timeline{
    flex-direction:column;
    align-items:center;
    width:95%;
  }

  /* TRỤC DỌC GIỮA */
  .timeline::before{
    left:50%;
    top:0;
    width:4px;
    height:100%;
  }

  /* ITEM */
  .item{
    width:100%;
    display:flex;
    align-items:center;
    margin:25px 0;
    position:relative;
  }

  /* DOT nằm giữa trục */
  .dot{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    margin:0;
  }

  /* BOX */
  .box{
    width:45%;
    min-width:auto;
  }

  /* SO LE TRÁI */
  .item:nth-child(odd){
    justify-content:flex-start;
  }

  .item:nth-child(odd) .box{
    text-align:right;
    margin-right:55%;
  }

  /* SO LE PHẢI */
  .item:nth-child(even){
    justify-content:flex-end;
  }

  .item:nth-child(even) .box{
    text-align:left;
    margin-left:55%;
  }
/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:16px;
}

/* Ẩn thanh scroll cho đẹp */
.bottom-nav::-webkit-scrollbar{
  display:none;
}

.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-size:1.1rem;
}

/* Hover */
.bottom-nav button:hover{
  background:#FFD700;
  color:black;
}

/* MOBILE tối ưu hơn */
@media(max-width:768px){
  .bottom-nav{
    padding:8px 5px;
  }

  .bottom-nav button{
    font-size:0.8rem;
    padding:8px;
  }
}
}
</style>
</head>

<body>

<div class="title">🏛️ CÁC GIAI ĐOẠN CÁCH MẠNG CỦA LỰC LƯỢNG AN NINH NHÂN DÂN</div>

<div class="timeline">

  <div class="item" onclick="openPanel(4)">
    <div class="dot"></div>
    <div class="box">1945 - 1954</div>
  </div>

  <div class="item" onclick="openPanel(3)">
    <div class="dot"></div>
    <div class="box">1954 - 1975</div>
  </div>

  <div class="item" onclick="openPanel(2)">
    <div class="dot"></div>
    <div class="box">1975 - 1986</div>
  </div>

  <div class="item" onclick="openPanel(1)">
    <div class="dot"></div>
    <div class="box">1986 - nay</div>
  </div>

</div>
<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="go('index.html')">🏠 Trang chủ</button>
  <button onclick="go('gioithieuchung.html')">📄 Giới thiệu</button>
  <button onclick="go('traloicauhoi.html')">📌Trả lời câu hỏi</button>
  <button onclick="go('vanbanluat.html')">📚Tiến trình lịch sử</button>
  <button onclick="go('hinhanh.html')">🎥Tư liệu tuyên truyền</button>
  <button onclick="go('trochoitracnghiem.html')">🛡️Trò chơi trắc nghiệm</button>
  <button onclick="go('maqr.html')">🧠 QR tài liệu</button>
  <button onclick="go('khuyennghi.html')">📎 Ý kiến đóng góp</button>
</div>
<!-- PANEL -->
<div id="panel" class="panel">

  <div class="close" onclick="closePanel()">✖</div>

  <div class="tabs">
    <button onclick="showTab('info')" class="active">Bối cảnh lịch sử</button>
    <button onclick="showTab('battle')">Chiến công tiêu biểu</button>
    <button onclick="showTab('person')">Nhân vật lịch sử</button> <!-- 👈 thêm -->
  </div>

  <div id="info" class="tab-content active"></div>
  <div id="battle" class="tab-content"></div>
  <div id="person" class="tab-content"></div> <!-- 👈 thêm -->

</div>

<script>
function openPanel(id){
  let panel = document.getElementById("panel");
  panel.classList.add("active");

  let info = "";
  let battle = "";
  let person = ""; // 👈 thêm

  if(id==1){
    info = "1945–1954: Kháng chiến chống Pháp.";
    battle = "<ul><li>Việt Bắc</li><li>Biên giới</li><li>Điện Biên Phủ</li></ul>";
    person = "<ul><li>Hồ Chí Minh</li><li>Võ Nguyên Giáp</li></ul>";
  }

  if(id==2){
    info = "1954–1975: Kháng chiến chống Mỹ.";
    battle = "<ul><li>Đồng khởi</li><li>Ấp Bắc</li><li>Chiến dịch Hồ Chí Minh</li></ul>";
    person = "<ul><li>Nguyễn Văn Trỗi</li><li>Tố Hữu</li></ul>";
  }

  if(id==3){
    info = "1975–1986: Xây dựng đất nước.";
    battle = "<ul><li>Bảo vệ biên giới</li></ul>";
    person = "<ul><li>Lê Duẩn</li><li>Phạm Văn Đồng</li></ul>";
  }

  if(id==4){
    info = "1986–nay: Đổi mới, hội nhập.";
    battle = "<ul><li>Đổi mới</li><li>Gia nhập ASEAN</li></ul>";
    person = "<ul><li>Nguyễn Văn Linh</li><li>Võ Văn Kiệt</li></ul>";
  }

  document.getElementById("info").innerHTML = info;
  document.getElementById("battle").innerHTML = battle;
  document.getElementById("person").innerHTML = person; // 👈 thêm

  showTab('info');
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(e=>e.classList.remove('active'));

  document.getElementById(tab).classList.add('active');

  let btns = document.querySelectorAll('.tabs button');
  if(tab === 'info') btns[0].classList.add('active');
  if(tab === 'battle') btns[1].classList.add('active');
  if(tab === 'person') btns[2].classList.add('active'); // 👈 thêm
}
</script>

</body>
</html>
