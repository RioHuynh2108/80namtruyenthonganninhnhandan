<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏛️ Timeline lịch sử</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Be Vietnam Pro',sans-serif;
  color:white;
  transition:0.3s;
  padding-bottom:80px;
}

/* VIDEO NỀN */
#video-background{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  pointer-events:none;
}


/* TITLE */
.title{
  text-align:center;
  font-size:1.5rem;
  color:#FFD700;
  margin-bottom:20px;
}

/* TIMELINE */
.timeline{
  position:relative;
  width:90%;
  margin:60px auto;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

/* TRỤC */
.timeline::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;
  background:linear-gradient(to right, #FFD700, transparent);
}

/* ITEM */
.item{
  text-align:center;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* DOT */
.dot{
  width:18px;
  height:18px;
  background:#FFD700;
  border-radius:50%;
  margin-top:-9px;
  box-shadow:0 0 10px #FFD700;
}

/* BOX */
.box{
  margin-top:12px;
  background:rgba(0,0,0,0.7);
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.5);
  transition:0.3s;
  min-width:110px;
  backdrop-filter:blur(5px);
}

.box:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #FFD700;
}

/* PANEL */
.panel{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:75%;
  background:#111;
  border-top:3px solid #FFD700;
  transition:0.5s;
  padding:20px;
  overflow:auto;
}

.panel.active{
  bottom:0;
}

/* CLOSE */
.close{
  position:absolute;
  top:10px;
  right:20px;
  font-size:28px;
  cursor:pointer;
}

/* TAB */
.tabs{
  display:flex;
  gap:10px;
  margin-top:30px;
}

.tabs button{
  padding:8px 15px;
  border:none;
  background:#333;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

.tabs button.active{
  background:#FFD700;
  color:black;
}

/* CONTENT */
.tab-content{
  display:none;
  margin-top:15px;
}

.tab-content.active{
  display:block;
}

/* MOBILE ZIGZAG */
@media(max-width:768px){

  .timeline{
    flex-direction:column;
    align-items:center;
  }

  .timeline::before{
    left:50%;
    width:4px;
    height:100%;
  }

  .item{
    width:100%;
    display:flex;
    align-items:center;
    margin:25px 0;
    position:relative;
  }

  .dot{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
  }

  .box{
    width:45%;
  }

  .item:nth-child(odd){
    justify-content:flex-start;
  }

  .item:nth-child(odd) .box{
    text-align:right;
    margin-right:55%;
  }

  .item:nth-child(even){
    justify-content:flex-end;
  }

  .item:nth-child(even) .box{
    text-align:left;
    margin-left:55%;
  }
}
/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  top:20px;
  right:12px;
  z-index:999;
  background:#FFD700;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-size:0.8rem;
}
/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:16px;
}
.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-size:1rem;
}

.bottom-nav button:hover{
  background:#FFD700;
  color:black;
}
</style>
</head>

<body>

<video id="video-background" autoplay loop muted playsinline>
  <source src="videonen.mp4">
</video>

<div class="overlay">
<audio id="bg-music" loop>
  <source src="nhacnen.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>
<div class="title">🏛️ CÁC GIAI ĐOẠN CÁCH MẠNG CỦA LỰC LƯỢNG AN NINH NHÂN DÂN</div>

<div class="timeline">

  <div class="item" onclick="openPanel(4)">
    <div class="dot"></div>
    <div class="box">1945 - 1954</div>
  </div>

  <div class="item" onclick="openPanel(3)">
    <div class="dot"></div>
    <div class="box">1954 - 1975</div>
  </div>

  <div class="item" onclick="openPanel(2)">
    <div class="dot"></div>
    <div class="box">1975 - 1986</div>
  </div>

  <div class="item" onclick="openPanel(1)">
    <div class="dot"></div>
    <div class="box">1986 - nay</div>
  </div>

</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">

  <div class="close" onclick="closePanel()">✖</div>

  <div class="tabs">
    <button onclick="showTab('info')" class="active">Bối cảnh</button>
    <button onclick="showTab('battle')">Chiến công</button>
    <button onclick="showTab('person')">Nhân vật</button>
  </div>

  <div id="info" class="tab-content active"></div>
  <div id="battle" class="tab-content"></div>
  <div id="person" class="tab-content"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="go('index.html')">🏠 Trang chủ</button>
  <button onclick="go('gioithieuchung.html')">📄 Giới thiệu bài dự thi</button>
  <button onclick="go('traloicauhoi.html')">📌Trả lời câu hỏi bài dự thi</button>
  <button onclick="go('tientrinhlichsu.html')">📚 Tiến trình lịch sử</button>
  <button onclick="go('hinhanh.html')">🎥 Tư liệu tuyên truyền</button>
  <button onclick="go('trochoitracnghiem.html')">🛡️Mini game</button>
  <button onclick="go('maqr.html')">🧠 Chatbot AI</button>
  <button onclick="go('khuyennghi.html')">📎 Ý kiến đóng ý</button>
</div>

<script>
function openPanel(id){
  let panel = document.getElementById("panel");
  panel.classList.add("active");

  let info="", battle="", person="";

  if(id==1){
    info="1945–1954: Kháng chiến chống Pháp.";
    battle="<ul><li>Việt Bắc</li><li>Biên giới</li><li>Điện Biên Phủ</li></ul>";
    person="<ul><li>Hồ Chí Minh</li><li>Võ Nguyên Giáp</li></ul>";
  }
  if(id==2){
    info="1954–1975: Kháng chiến chống Mỹ.";
    battle="<ul><li>Đồng khởi</li><li>Ấp Bắc</li><li>Hồ Chí Minh</li></ul>";
    person="<ul><li>Nguyễn Văn Trỗi</li><li>Tố Hữu</li></ul>";
  }
  if(id==3){
    info="1975–1986: Xây dựng đất nước.";
    battle="<ul><li>Bảo vệ biên giới</li></ul>";
    person="<ul><li>Lê Duẩn</li><li>Phạm Văn Đồng</li></ul>";
  }
  if(id==4){
    info="1986–nay: Đổi mới, hội nhập.";
    battle="<ul><li>Đổi mới</li><li>ASEAN</li></ul>";
    person="<ul><li>Nguyễn Văn Linh</li><li>Võ Văn Kiệt</li></ul>";
  }

  document.getElementById("info").innerHTML=info;
  document.getElementById("battle").innerHTML=battle;
  document.getElementById("person").innerHTML=person;

  showTab('info');
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(e=>e.classList.remove('active'));

  document.getElementById(tab).classList.add('active');

  let btns=document.querySelectorAll('.tabs button');
  if(tab==='info') btns[0].classList.add('active');
  if(tab==='battle') btns[1].classList.add('active');
  if(tab==='person') btns[2].classList.add('active');
}

function go(link){
  document.body.style.opacity="0";
  setTimeout(()=>{window.location=link},300);
}
  
const music=document.getElementById('bg-music');
let isPlaying=false;

function toggleMusic(){
  if(isPlaying){music.pause();}
  else{music.play();}
  isPlaying=!isPlaying;
}
</script>

</body>
</html>
