<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏛️ Timeline lịch sử</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Be Vietnam Pro',sans-serif;
  color:white;
  transition:0.3s;
  padding-bottom:80px;
}

#bg-image{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:url('anhnen2.png') no-repeat center center;
  background-size:cover;

  z-index:-1; /* nằm dưới game */
}

/* TITLE */
.title{
  text-align:center;
  font-size:1.5rem;
  color:#FFD700;
  margin-bottom:20px;
}

/* TIMELINE */
.timeline{
  position:relative;
  width:90%;
  margin:60px auto;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

/* TRỤC */
.timeline::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;
  background:linear-gradient(to right, #FFD700, transparent);
}

/* ITEM */
.item{
  text-align:center;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* DOT */
.dot{
  width:18px;
  height:18px;
  background:#FFD700;
  border-radius:50%;
  margin-top:-9px;
  box-shadow:0 0 10px #FFD700;
}

/* BOX */
.box{
  margin-top:12px;
  background:rgba(0,0,0,0.7);
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.5);
  transition:0.3s;
  min-width:110px;
  backdrop-filter:blur(5px);
}

.box:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #FFD700;
}

/* PANEL */
.panel{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:75%;
  background:#111;
  border-top:3px solid #FFD700;
  transition:0.5s;
  padding:20px;
  overflow:auto;
}

.panel.active{
  bottom:0;
}

/* CLOSE */
.close{
  position:absolute;
  top:10px;
  right:20px;
  font-size:28px;
  cursor:pointer;
}

/* TAB */
.tabs{
  display:flex;
  gap:10px;
  margin-top:30px;
}

.tabs button{
  padding:8px 15px;
  border:none;
  background:#333;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

.tabs button.active{
  background:#FFD700;
  color:black;
}

/* CONTENT */
.tab-content{
  display:none;
  margin-top:15px;
}

.tab-content.active{
  display:block;
}

/* MOBILE ZIGZAG */
@media(max-width:768px){

  .timeline{
    flex-direction:column;
    align-items:center;
  }

  .timeline::before{
    left:50%;
    width:4px;
    height:100%;
  }

  .item{
    width:100%;
    display:flex;
    align-items:center;
    margin:25px 0;
    position:relative;
  }

  .dot{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
  }

  .box{
    width:45%;
  }

  .item:nth-child(odd){
    justify-content:flex-start;
  }

  .item:nth-child(odd) .box{
    text-align:right;
    margin-right:55%;
  }

  .item:nth-child(even){
    justify-content:flex-end;
  }

  .item:nth-child(even) .box{
    text-align:left;
    margin-left:55%;
  }
}

/* MARQUEE */
.marquee{
  overflow:hidden;
  background:rgba(0,0,0,0.7);
  padding:8px 0;
  margin:15px 0;
}

.marquee span{
  display:inline-block;
  white-space:nowrap;
  animation:marquee 12s linear infinite;
  color:#FFD700;
}
/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  top:30px;
  right:12px;
  z-index:999;
  background:#FFD700;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-size:0.8rem;
}
/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:16px;
}
.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-size:1rem;
}

.bottom-nav button:hover{
  background:#FFD700;
  color:black;
}
</style>
</head>

<body>
<div id="bg-image"></div>

<div class="overlay">
<audio id="bg-music" loop>
  <source src="nhacnen.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>
<div class="title">🏛️ CÁC GIAI ĐOẠN CÁCH MẠNG CỦA LỰC LƯỢNG AN NINH NHÂN DÂN</div>

<div class="marquee">
  <span>📢 Bạn đang xem nội dung các giai đoạn cách mạng của lực lượng ANND - Hãy nhấn chọn các giai đoạn để xem📢</span>
</div>

<div class="timeline">

  <div class="item" onclick="openPanel(4)">
    <div class="dot"></div>
    <div class="box">1945 - 1954</div>
  </div>

  <div class="item" onclick="openPanel(3)">
    <div class="dot"></div>
    <div class="box">1954 - 1975</div>
  </div>

  <div class="item" onclick="openPanel(2)">
    <div class="dot"></div>
    <div class="box">1975 - 1986</div>
  </div>

  <div class="item" onclick="openPanel(1)">
    <div class="dot"></div>
    <div class="box">1986 - nay</div>
  </div>

</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">

  <div class="close" onclick="closePanel()">✖</div>

  <div class="tabs">
    <button onclick="showTab('info')" class="active">Bối cảnh lịch sử</button>
    <button onclick="showTab('battle')">Chiến công tiêu biểu</button>
  </div>

  <div id="info" class="tab-content active"></div>
  <div id="battle" class="tab-content"></div>


</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="go('index.html')">🏠 Trang chủ</button>
  <button onclick="go('gioithieuchung.html')">📄 Giới thiệu bài dự thi</button>
  <button onclick="go('traloicauhoi.html')">📌Trả lời câu hỏi bài dự thi</button>
  <button onclick="go('tientrinhlichsu.html')">📚 Tiến trình lịch sử</button>
  <button onclick="go('hinhanh.html')">🎥 Tư liệu tuyên truyền</button>
  <button onclick="go('trochoitracnghiem.html')">🛡️Mini game</button>
  <button onclick="go('maqr.html')">🧠 Chatbot AI</button>
  <button onclick="go('khuyennghi.html')">📎 Ý kiến đóng ý</button>
</div>

<script>
function openPanel(id){
  let panel = document.getElementById("panel");
  panel.classList.add("active");

  let info="", battle="";

  if(id==4){
  info = `
  <b>Giai đoạn 1945–1954: Hình thành và trưởng thành trong kháng chiến chống thực dân Pháp</b><br><br>
  - Ngay sau Cách mạng Tháng Tám năm 1945, lực lượng Công an nhân dân, trong đó có lực lượng An ninh nhân dân, được thành lập với nhiệm vụ trọng yếu là bảo vệ chính quyền cách mạng non trẻ. Trong bối cảnh thù trong, giặc ngoài đan xen, lực lượng An ninh đã nhanh chóng tổ chức, xây dựng mạng lưới, chủ động phát hiện, đấu tranh làm thất bại các âm mưu phá hoại của các thế lực phản động, gián điệp và tay sai của thực dân Pháp.<br><br>
  - Trong suốt cuộc kháng chiến chống Pháp, lực lượng An ninh nhân dân đã lập nhiều chiến công xuất sắc trong bảo vệ cơ quan đầu não của Đảng, Nhà nước, giữ gìn bí mật quốc gia, bảo vệ an toàn các chiến dịch quân sự quan trọng. Đây là giai đoạn đặt nền móng cho truyền thống “tuyệt đối trung thành, mưu trí, dũng cảm” của lực lượng.
  <br><br>
  - Vai trò của lực lượng ANND giai đoạn này:<br>
+ Bảo vệ tuyệt đối an toàn Chính phủ, Chủ tịch Hồ Chí Minh và các cơ quan đầu não của Đảng.<br>
+ Đấu tranh làm thất bại các tổ chức phản cách mạng như Việt Quốc, Việt Cách.<br>
+ Phát hiện, bóc gỡ nhiều mạng lưới gián điệp, biệt kích do thực dân Pháp cài lại.<br>
+ ảo vệ an toàn căn cứ địa Việt Bắc – “thủ đô kháng chiến.`;

  battle = `
  <ul>
    <li>1.Vụ án Ôn Như Hầu (1946) – Chiến công đầu tiên đặt nền móng cho lực lượng An ninh nhân dân</li>
    <li>2.Đánh đắm Thông báo hạm A-mio-đanh-vin (1950) - Chiến công chói ngời trang sử truyền thống của lực lượng An ninh nhân dân</li>
    <li>3.Khám phá tổ chức gián điệp do đế quốc Mỹ và thực dân Pháp cài lại ở Hà Nội, Hải Phòng, Nam Định (Chuyên án C30, 1954 - 1958)</li>
  </ul>`;

  person = `
  <ul>
    <li>:contentReference[oaicite:0]{index=0}</li>
    <li>:contentReference[oaicite:1]{index=1}</li>
  </ul>`;
}

if(id==3){
  info = `
  <b>Giai đoạn 1954–1975: Phát triển và lập nhiều chiến công trong kháng chiến chống Mỹ</b><br><br>
  - Sau năm 1954, lực lượng An ninh nhân dân được củng cố và phát triển mạnh mẽ ở cả hai miền. Ở miền Bắc, lực lượng tập trung bảo vệ công cuộc xây dựng chủ nghĩa xã hội, đấu tranh chống gián điệp, biệt kích, bảo vệ nội bộ và an ninh chính trị. Ở miền Nam, lực lượng An ninh hoạt động bí mật, bám dân, xây dựng cơ sở cách mạng, thu thập tin tức tình báo, góp phần quan trọng vào cuộc đấu tranh giải phóng miền Nam.<br><br>
  - Lực lượng An ninh đã phá nhiều chuyên án lớn, làm thất bại các kế hoạch tình báo của địch, góp phần bảo vệ lực lượng cách mạng và phục vụ thắng lợi của các chiến dịch lớn. Đây là giai đoạn thể hiện rõ bản lĩnh, trí tuệ và sự hy sinh thầm lặng của lực lượng An ninh nhân dân.
  <br><br>
  - Vai trò của lực lượng ANND giai đoạn này:<br>
+ Phá hàng loạt chuyên án gián điệp, biệt kích xâm nhập miền Bắc (các toán biệt kích Mỹ - ngụy).<br>
+ Bóc gỡ mạng lưới tình báo, nội gián hoạt động phá hoại hậu phương XHCN.<br>
+ Bảo vệ an toàn các cơ quan lãnh đạo cách mạng ở cả hai miền.`;


  battle = `
  <ul>
    <li>1.Chiến công của Đoàn 180 An ninh vũ trang miền Nam góp phần đánh bại cuộc hành quân Junction City của Mĩ</li>
    <li>2.Chiến công của Lực lượng an ninh T4 trong cuộc Tổng tiến công và nổi dậy Xuân Mậu Thân 1968</li>
    <li>3.Chiến công của Lực lượng Bảo vệ an ninh nội bộ và văn hóa tư tưởng trong việc vạch trần và bắt giữ tên nội gián Võ Văn Ba, bí số X92</li>
    <li>4.Chiến công của Lực lượng An ninh miền Nam trong cuộc Tổng tiến công và nổi dậy Xuân Mậu Thân 1968</li>
  </ul>`;

  person = `
  <ul>
    <li>:contentReference[oaicite:2]{index=2}</li>
    <li>:contentReference[oaicite:3]{index=3}</li>
  </ul>`;
}

if(id==2){
  info = `
  <b>Giai đoạn 1975–1986: Bảo vệ an ninh quốc gia, giữ vững ổn định sau thống nhất</b><br><br>
  - Sau khi đất nước thống nhất, lực lượng An ninh nhân dân bước vào giai đoạn mới với nhiệm vụ bảo vệ an ninh quốc gia trên phạm vi cả nước. Trong bối cảnh tình hình chính trị – xã hội còn nhiều khó khăn, lực lượng đã tập trung đấu tranh chống các hoạt động chống phá của các thế lực thù địch, phản động trong và ngoài nước.<br><br>
  - Nhiều chuyên án lớn được triển khai, tiêu biểu như các hoạt động đấu tranh chống nội phản, gián điệp, bảo vệ biên giới và chủ quyền quốc gia. Lực lượng An ninh tiếp tục khẳng định vai trò nòng cốt trong bảo vệ Đảng, Nhà nước và nhân dân.
  <br><br>
  - Vai trò của lực lượng ANND giai đoạn này:<br>
+ Đấu tranh triệt phá các tổ chức phản động trong và ngoài nước móc nối phá hoại.<br>
+ Ngăn chặn hoạt động gián điệp, tình báo nước ngoài.<br>
+ Giữ vững ổn định chính trị – xã hội trong giai đoạn khó khăn sau chiến tranh.`;

  battle = `
  <ul>
    <li>1.Chiến công của lực lượng An ninh nhân dân trong Chuyên án “Cao nguyên F101”</li>
    <li>2.Chiến công của lực lượng An ninh nhân dân trong thắng lợi Kế hoạch phản gián CM12</li>
  </ul>`;

  person = `
  <ul>
    <li>:contentReference[oaicite:4]{index=4}</li>
    <li>:contentReference[oaicite:5]{index=5}</li>
  </ul>`;
}

if(id==1){
  info = `
  <b>Giai đoạn 1986–nay: Đổi mới, hiện đại hóa và hội nhập quốc tế</b><br><br>
  - Từ năm 1986, đất nước bước vào thời kỳ Đổi mới, đặt ra nhiều yêu cầu mới đối với nhiệm vụ bảo vệ an ninh quốc gia. Lực lượng An ninh nhân dân đã chủ động đổi mới toàn diện về tổ chức, phương thức hoạt động, ứng dụng khoa học – công nghệ, nâng cao chất lượng nghiệp vụ.<br><br>
  - Trong bối cảnh hội nhập quốc tế sâu rộng, lực lượng An ninh tập trung đấu tranh với các thách thức an ninh phi truyền thống như an ninh mạng, tội phạm công nghệ cao, an ninh kinh tế và âm mưu “diễn biến hòa bình”. Đồng thời, lực lượng không ngừng xây dựng theo hướng cách mạng, chính quy, tinh nhuệ, từng bước hiện đại, đáp ứng yêu cầu nhiệm vụ trong tình hình mới.
   <br><br>
  - Vai trò của lực lượng ANND giai đoạn này:<br>
+ Đấu tranh làm thất bại âm mưu “diễn biến hòa bình”, bạo loạn lật đổ.<br>
+ Triệt phá nhiều đường dây tội phạm công nghệ cao, lừa đảo xuyên quốc gia.<br>
+ Bảo vệ an ninh mạng, an ninh dữ liệu quốc gia trong thời đại số.<br>
+ Đảm bảo an ninh cho các sự kiện chính trị – đối ngoại quan trọng của đất nước.`;

  battle = `
  <ul>
    <li>Đấu tranh phòng chống tội phạm công nghệ cao</li>
    <li>Bảo vệ an ninh mạng, an ninh dữ liệu quốc gia</li>
    <li>Ngăn chặn âm mưu “diễn biến hòa bình”</li>
  </ul>`;

  person = `
  <ul>
    <li>:contentReference[oaicite:6]{index=6}</li>
    <li>:contentReference[oaicite:7]{index=7}</li>
  </ul>`;
}

  document.getElementById("info").innerHTML=info;
  document.getElementById("battle").innerHTML=battle;
  document.getElementById("person").innerHTML=person;

  showTab('info');
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(e=>e.classList.remove('active'));

  document.getElementById(tab).classList.add('active');

  let btns=document.querySelectorAll('.tabs button');
  if(tab==='info') btns[0].classList.add('active');
  if(tab==='battle') btns[1].classList.add('active');
  if(tab==='person') btns[2].classList.add('active');
}

function go(link){
  document.body.style.opacity="0";
  setTimeout(()=>{window.location=link},300);
}
  
const music=document.getElementById('bg-music');
let isPlaying=false;

function toggleMusic(){
  if(isPlaying){music.pause();}
  else{music.play();}
  isPlaying=!isPlaying;
}
</script>

</body>
</html>
