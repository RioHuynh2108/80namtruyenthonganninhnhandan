<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚓 Game ANND</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#87CEEB;
  touch-action:manipulation;
}

/* GAME */
.game{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* SCENERY */
.scenery{
  position:absolute;
  bottom:100px;
  width:200%;
  height:40vh; /* 🔥 responsive */
  background:url('cayxanhto.jpg') repeat-x;
  background-size:contain;
  animation:moveBg 20s linear infinite;
  z-index:1;
}

/* ROAD */
.road{
  position:absolute;
  bottom:0;
  width:200%;
  height:100px;
  background:#333;
  animation:moveBg 2s linear infinite;
  z-index:2;
}

@keyframes moveBg{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* CAR */
.car{
  position:absolute;
  bottom:90px;
  left:20px;
  font-size:60px; /* 🔥 nhỏ lại cho mobile */
  z-index:3;
}

/* OBSTACLE */
.obstacle{
  position:absolute;
  bottom:90px;
  right:-80px;
  font-size:60px; /* 🔥 nhỏ lại */
  z-index:3;
}

/* UI */
.ui{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#FFD700;
  font-size:16px;
  z-index:5;
}

/* QUIZ */
.quiz{
  position:absolute;
  bottom:30;
  left:0;
  width:90%;
  background:rgba(0,0,0,0.9);
  padding:12px;
  border-radius:12px 1212px 0 0;
  display:none;
  z-index:10;
}

/* CÂU HỎI */
#question{
  font-size:14px;
  margin-bottom:11px;
}

/* NÚT ĐÁP ÁN */
.quiz button{
  display:block;
  width:90%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#444;
  color:white;
  font-size:12px;
}

/* MENU */
.menu{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:20;
}

.menu button{
  width:200px;
  padding:14px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#FFD700;
}

/* 📱 MOBILE FIX */
@media (max-width:480px){

  .car{
    font-size:80px;
    left:20px;
  }

  .obstacle{
    font-size:50px;
  }

  .road{
    height:130px;
  }

  .scenery{
    height:35vh;
  }

  #question{
    font-size:13px;
  }

  .quiz button{
    font-size:15px;
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="game">

  <!-- MENU -->
  <div class="menu" id="menu">
    <h2>🚓 GAME ANND</h2>
    <button onclick="startGame()">▶️ Bắt đầu</button>
    <button onclick="exitGame()">❌ Thoát</button>
  </div>

  <!-- UI -->
  <div class="ui">
    Điểm: <span id="score">0</span>
    <div id="health"></div>
  </div>

  <div class="scenery"></div>
  <div class="road"></div>

  <div class="car">🚓</div>
  <div class="obstacle" id="obs">🪨</div>

  <!-- QUIZ -->
  <div class="quiz" id="quizBox">
    <div id="question"></div>
    <div id="answers"></div>
  </div>

</div>

<script>
const questions = [
  {q:"ANND thành lập năm nào?",a:["1945","1954","1975","1986"],correct:0},
  {q:"Ngày truyền thống ANND?",a:["19/8","2/9","30/4","22/12"],correct:0},
  {q:"Lực lượng ANND thuộc?",a:["Quân đội","Công an","Biên phòng","Dân quân"],correct:1},
  {q:"Nhiệm vụ chính?",a:["An ninh","Y tế","Giáo dục","Kinh tế"],correct:0},
  {q:"Ai tham gia bảo vệ?",a:["Nhân dân","Chỉ CA","Không ai","Quân đội"],correct:0}
];

let score = 0;
let health = 3;
let qIndex = 0;
let gameRunning = false;
let obstacleMoving = false;

const obs = document.getElementById("obs");
const quizBox = document.getElementById("quizBox");

/* HIỂN THỊ MÁU */
function renderHealth(){
  document.getElementById("health").innerHTML = "❤️".repeat(health);
}
renderHealth();

/* START */
function startGame(){
  document.getElementById("menu").style.display="none";
  gameRunning = true;
  spawnObstacle();
}

/* EXIT */
function exitGame(){
  window.location.href="trochoitracnghiem.html";
}

/* SPAWN ĐÁ */
function spawnObstacle(){
  obstacleMoving = true;

  obs.style.transition = "none";
  obs.style.right = "-100px";

  setTimeout(()=>{
    obs.style.transition = "right 3s linear";
    obs.style.right = "110%";
  },50);
}

/* CHECK VA CHẠM */
function checkObstacle(){
  if(!gameRunning || !obstacleMoving) return;

  const car = document.querySelector(".car").getBoundingClientRect();
  const rock = obs.getBoundingClientRect();

  if(
    car.right > rock.left &&
    car.left < rock.right &&
    car.bottom > rock.top
  ){
    pauseGame();
    showQuiz();
  }
}
setInterval(checkObstacle, 30);

/* 🛑 PAUSE */
function pauseGame(){
  gameRunning = false;
  obstacleMoving = false;

  // ❗ giữ nguyên vị trí đá (freeze)
  const currentRight = window.getComputedStyle(obs).right;
  obs.style.transition = "none";
  obs.style.right = currentRight;

  // dừng background
  document.querySelector(".road").style.animationPlayState = "paused";
  document.querySelector(".scenery").style.animationPlayState = "paused";
}

/* ▶️ RESUME */
function resumeGame(){
  gameRunning = true;

  document.querySelector(".road").style.animationPlayState = "running";
  document.querySelector(".scenery").style.animationPlayState = "running";

  spawnObstacle(); // tạo đá mới
}

/* HIỆN CÂU HỎI */
function showQuiz(){
  const q = questions[qIndex];
  quizBox.style.display="block";

  document.getElementById("question").innerText = q.q;

  const ansBox = document.getElementById("answers");
  ansBox.innerHTML="";

  q.a.forEach((ans,i)=>{
    ansBox.innerHTML += `<button onclick="answer(${i})">${ans}</button>`;
  });
}

/* TRẢ LỜI */
function answer(i){
  const q = questions[qIndex];

  if(i === q.correct){
    score++;
    document.getElementById("score").innerText = score;

    quizBox.style.display="none";
    qIndex++;

    if(qIndex >= 5){
      return finishGame();
    }

    resumeGame(); // chạy tiếp ngay
  }else{
    health--;
    renderHealth();

    if(health <= 0){
      return gameOver();
    }

    // sai → hỏi tiếp tại chỗ
    qIndex++;
    showQuiz();
  }
}

/* WIN */
function finishGame(){
  alert("🏁 Về đích!\nĐiểm: " + score + "/5");
  location.reload();
}

/* GAME OVER */
function gameOver(){
  alert("💀 Hết máu!\nĐiểm: " + score);
  location.reload();
}
</script>

</body>
</html>
