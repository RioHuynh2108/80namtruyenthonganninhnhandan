<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🛡️ Trò chơi trắc nghiệm</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Be Vietnam Pro',sans-serif;
  color:white;
}

/* VIDEO */
#video-background{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}


/* HEADER */
.header{text-align:center}
.header h1{color:#FFD700;font-size:1.5rem}

/* STATUS */
.status{
  text-align:center;
  margin-top:5px;
  color:#FFD700;
}

/* PROGRESS */
.progress-container{
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  margin:10px 0;
}
.progress-bar{
  height:100%;
  width:0%;
  background:#FFD700;
  transition:0.4s;
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:20px;
}

.menu button{
  padding:16px;
  border-radius:12px;
  border:1px solid #FFD700;
  background:rgba(0,0,0,0.8);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.menu button:hover{
  transform:scale(1.05);
}

.menu button.active{
  background:#FFD700;
  color:black;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-size:0.75rem;
}
</style>
</head>

<body>

<video id="video-background" autoplay loop muted playsinline>
  <source src="videonen.mp4">
</video>

<div class="overlay">

<div class="header">
  <h1>🛡️ TRÒ CHƠI TRẮC NGHIỆM</h1>
</div>

<div class="status" id="statusText">Chọn trò chơi</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="menu">
  <button onclick="openGame(1,this)">⚽ Sút bóng vào gôn</button>
  <button onclick="openGame(2,this)">🚓 Vượt chướng ngại vật</button>
</div>

</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="go('index.html')">🏠 Trang chủ </button>
  <button onclick="go('gioithieuchung.html')">📄 Giới thiệu</button>
  <button onclick="go('traloicauhoi.html')">📌Trả lời câu hỏi</button>
  <button onclick="go('vanbanluat.html')">📚Tiến trình lịch sử</button>
  <button onclick="go('hinhanh.html')">🎥Tư liệu tuyên truyền</button>
  <button onclick="go('tracnghiem.html')">🛡️Trò chơi trắc nghiệm</button>
  <button onclick="go('maqr.html')">🧠 QR tài liệu</button>
  <button onclick="go('khuyennghi.html')">📎 Ý kiến đóng góp</button>
</div>

<script>
function openGame(num,btn){

  document.querySelectorAll('.menu button')
    .forEach(b=>b.classList.remove('active'));

  btn.classList.add('active');

  document.getElementById("progressBar").style.width = (num/2)*100 + "%";

  document.getElementById("statusText").innerText =
    num === 1 ? "⚽ Đang chọn: Sút bóng"
              : "🚓 Đang chọn: Vượt chướng ngại vật";

  setTimeout(()=>{
    if(num===1){
      window.location="trochoisutbong.html";
    }else{
      window.location="trochoixe.html";
    }
  },300);
}

/* NAV */
function go(link){
  document.body.style.opacity="0";
  setTimeout(()=>{window.location=link},300);
}
</script>

</body>
</html>
