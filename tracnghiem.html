<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game sút bóng trắc nghiệm</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a1f2e;
  color:white;
  text-align:center;
}

/* SÂN */
.field{
  position:relative;
  width:100%;
  height:300px;
  background:linear-gradient(#1e7d32,#4caf50);
  overflow:hidden;
}

/* KHUNG THÀNH */
.goal{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:200px;
  height:100px;
  border:4px solid white;
  border-bottom:none;
}

/* THỦ MÔN (FIX) */
.goalkeeper{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  transition:0.4s ease;
  z-index:5;
}

/* ANIMATION */
.dive-left{
  transform:translateX(-120px) scale(1.1);
}
.dive-right{
  transform:translateX(60px) scale(1.1);
}

/* BÓNG */
.ball{
  position:absolute;
  bottom:20px;
  left:50%;
  width:40px;
  height:40px;
  background:white;
  border-radius:50%;
  transform:translateX(-50%);
  transition:0.6s ease;
}

/* PLAYER */
.player{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
}

/* CÂU HỎI */
.question{
  margin:15px;
  font-size:18px;
}

/* ĐÁP ÁN */
.answers button{
  display:block;
  width:90%;
  margin:8px auto;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.answers button:hover{
  background:#FFD700;
  color:black;
}

/* SCORE */
.score{
  margin:10px;
  font-size:18px;
  color:#FFD700;
}

/* RESULT */
.result{
  font-size:20px;
  margin-top:20px;
}

/* HIỆU ỨNG */
.goal-effect{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  color:#FFD700;
  opacity:0;
  transition:0.5s;
}
</style>
</head>

<body>

<h2>⚽ Game sút bóng - Trắc nghiệm ANND</h2>

<div class="score">Điểm: <span id="score">0</span>/10</div>

<div class="field">
  <div class="goal"></div>

  <!-- THỦ MÔN FIX -->
  <div class="goalkeeper" id="keeper">🧍‍♂️</div>

  <div class="ball" id="ball"></div>
  <div class="player">🧍‍♂️</div>
  <div class="goal-effect" id="effect"></div>
</div>

<div class="question" id="question"></div>
<div class="answers" id="answers"></div>
<div class="result" id="result"></div>

<script>
const questions = [
  {q:"Lực lượng ANND ra đời năm nào?",a:["1945","1946","1954","1975"],correct:0},
  {q:"Ngày truyền thống ANND?",a:["19/8","22/12","30/4","2/9"],correct:0},
  {q:"Ai là lãnh đạo đầu tiên?",a:["Hồ Chí Minh","Trần Quốc Hoàn","Phạm Văn Đồng","Võ Nguyên Giáp"],correct:1},
  {q:"ANND thuộc lực lượng nào?",a:["Quân đội","Công an","Dân quân","Biên phòng"],correct:1},
  {q:"Nhiệm vụ chính?",a:["Bảo vệ an ninh","Kinh tế","Y tế","Giáo dục"],correct:0},
  {q:"Thế trận gì quan trọng?",a:["Nhân dân","Kinh tế","Quốc tế","Quân sự"],correct:0},
  {q:"Công nghệ hiện nay?",a:["AI","Nông nghiệp","Thủ công","In ấn"],correct:0},
  {q:"Không gian nào mới?",a:["Mạng","Biển","Rừng","Núi"],correct:0},
  {q:"Ai tham gia bảo vệ?",a:["Nhân dân","Chỉ công an","Chỉ quân đội","Không ai"],correct:0},
  {q:"Vai trò ANND?",a:["Trung tâm bảo vệ","Phụ trợ","Không quan trọng","Không có"],correct:0}
];

let index = 0;
let score = 0;

const qEl = document.getElementById("question");
const aEl = document.getElementById("answers");
const ball = document.getElementById("ball");
const keeper = document.getElementById("keeper");
const effect = document.getElementById("effect");

function loadQuestion(){
  const q = questions[index];
  qEl.innerText = q.q;
  aEl.innerHTML = "";

  q.a.forEach((ans,i)=>{
    aEl.innerHTML += `<button onclick="shoot(${i})">${ans}</button>`;
  });
}

function moveKeeper(){
  keeper.classList.remove("dive-left","dive-right");

  if(Math.random() < 0.5){
    keeper.classList.add("dive-left");
  }else{
    keeper.classList.add("dive-right");
  }
}

function shoot(answer){

  const correct = questions[index].correct;

  moveKeeper();

  if(answer === correct){
    ball.style.transform = "translate(-50%, -200px)";

    effect.innerText = "GOAL!!! ⚽";
    score++;
    document.getElementById("score").innerText = score;

  }else{
    ball.style.transform = "translate(-150%, -150px)";
    effect.innerText = "MISS ❌";
  }

  effect.style.opacity = 1;

  setTimeout(()=>{
    nextQuestion();
    resetField();
  },1200);
}

function resetField(){
  ball.style.transform = "translateX(-50%)";
  keeper.classList.remove("dive-left","dive-right");
  effect.style.opacity = 0;
}

function nextQuestion(){
  index++;
  if(index < questions.length){
    loadQuestion();
  }else{
    endGame();
  }
}

function endGame(){
  qEl.innerText = "🎉 KẾT THÚC!";
  aEl.innerHTML = "";

  document.getElementById("result").innerText =
    "Bạn ghi được " + score + "/10 bàn ⚽";

  if(score >= 8){
    effect.innerText = "🏆 Xuất sắc!";
  }else if(score >=5){
    effect.innerText = "👍 Khá!";
  }else{
    effect.innerText = "💪 Cố gắng!";
  }

  effect.style.opacity = 1;
}

loadQuestion();
</script>

</body>
</html>
