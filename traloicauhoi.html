<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRẢ LỜI CÂU HỎI BÀI DỰ THI</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Be Vietnam Pro',sans-serif;
  color:white;
}

/* VIDEO */
#video-background{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}



/* HEADER */
.header{
  text-align:center;
}

.header h1{
  color:#FFD700;
  font-size:1.5rem;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:5px;
  color:#FFD700;
  font-size:0.9rem;
}

/* PROGRESS */
.progress-container{
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  overflow:hidden;
  margin:10px 0;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#FFD700;
  transition:0.4s;
}

/* MARQUEE */
.marquee{
  overflow:hidden;
  background:rgba(0,0,0,0.7);
  padding:8px;
  margin-bottom:10px;
}

.marquee span{
  display:inline-block;
  white-space:nowrap;
  animation:marquee 12s linear infinite;
  color:#FFD700;
}

@keyframes marquee{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-bottom:15px;
}

.menu button{
  padding:14px;
  border-radius:10px;
  border:1px solid #FFD700;
  background:rgba(0,0,0,0.8);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.menu button.active{
  background:#FFD700;
  color:black;
  transform:scale(1.05);
}

/* VIEWER */
.viewer{
  opacity:0;
  filter:blur(5px);
  transition:0.5s;
}

.viewer.active{
  opacity:1;
  filter:blur(0);
}

iframe{
  width:100%;
  height:70vh;
  border:none;
  border-radius:10px;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:16px;
}

.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-size:1.11rem;
}

/* DESKTOP */
@media(min-width:768px){
  .menu{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<video id="video-background" autoplay loop muted playsinline>
  <source src="videonen.mp4">
</video>

<div class="overlay">

<div class="header">
  <h1>📌 TRẢ LỜI CÂU HỎI BÀI DỰ THI</h1>
</div>

<div class="status" id="statusText">Chưa chọn quyển</div>

<!-- PROGRESS -->
<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="marquee">
  <span>📢 Vuốt trái/phải hoặc bấm để xem các Quyển dự thi 📢</span>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="openBook(1,this)">📘 Quyển 1 - 80 NĂM TRUYỀN THỐNG VẺ VÀ NHỮNG CHIẾN CÔNG TIÊU BIỂU CỦA LỰC AN NINH NHÂN DÂN VIỆT NAM</button>
  <button onclick="openBook(2,this)">📘 Quyển 2 - XÂY DỰNG VÀ PHÁT HUY THẾ TRẬN AN NINH NHÂN DÂN TRONG TÌNH HÌNH MỚI</button>

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <iframe id="frame"></iframe>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="go('index.html')">🏠 Trang chủ</button>
  <button onclick="go('gioithieuchung.html')">📄 Giới thiệu</button>
  <button onclick="go('traloicauhoi.html')">📌Trả lời câu hỏi</button>
  <button onclick="go('vanbanluat.html')">📚Tiến trình lịch sử</button>
  <button onclick="go('hinhanh.html')">🎥Tư liệu tuyên truyền</button>
  <button onclick="go('trochoitracnghiem.html')">🛡️Trò chơi trắc nghiệm</button>
  <button onclick="go('maqr.html')">🧠 QR tài liệu</button>
  <button onclick="go('khuyennghi.html')">📎 Ý kiến đóng góp</button>
</div>

<script>

const links=[
"",
"https://online.fliphtml5.com/jkhsr/ytit/",
"https://online.fliphtml5.com/jkhsr/fntz/"
];

let currentBook = 0;

/* OPEN BOOK */
function openBook(num,btn){

  currentBook = num;
  localStorage.setItem("book", num);

  // highlight
  document.querySelectorAll('.menu button')
    .forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.menu button')[num-1].classList.add('active');

  // progress
  document.getElementById("progressBar").style.width = (num/2)*100 + "%";

  // status
  document.getElementById("statusText").innerText = "📖 Đang xem: Quyển " + num;

  // fade iframe
  const viewer=document.getElementById("viewer");
  const frame=document.getElementById("frame");

  viewer.classList.remove("active");

  setTimeout(()=>{
    frame.src=links[num];
    frame.setAttribute("loading","lazy");
    viewer.classList.add("active");
  },200);
}

/* SWIPE */
let startX=0;

document.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    if(currentBook < 2) openBook(currentBook+1);
  }

  if(endX - startX > 50){
    if(currentBook > 1) openBook(currentBook-1);
  }
});

/* LOAD LAST */
window.onload = ()=>{
  const saved = localStorage.getItem("book");
  if(saved){
    openBook(parseInt(saved));
  }
};

/* NAV */
function go(link){
  document.body.style.opacity="0";
  setTimeout(()=>{window.location=link},300);
}

</script>

</body>
</html>
